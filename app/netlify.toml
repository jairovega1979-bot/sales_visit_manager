
[build]
  command = "yarn build:netlify"
  publish = "out"
  base = "app"

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9"
  YARN_VERSION = "1.22.19"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "yarn build:netlify"

[context.deploy-preview]
  command = "yarn build:netlify"

[context.branch-deploy]
  command = "yarn build:netlify"
